version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment: 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 3s
      retries: 2
    networks:
      - app_network
  backend:
    build: ./backend
    environment: 
      APP_NAME: ${APP_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
    depends_on:
      - db
    networks:
      - app_network
  frontend:
    build: ./frontend
    environment:
      APP_NAME: ${APP_NAME}
      BACKEND_URL: ${BACKEND_URL}
    ports:
      - 8080:8080
    depends_on:
      - backend
    networks:
      - app_network
volumes:
  pgdata:

networks:
  app_network: 
    driver: bridge
        